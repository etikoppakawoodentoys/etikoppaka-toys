query ListPublicItems @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public") {
  items(where: { isPublic: { eq: true } }) {
    id
    name
    description
  }
}

query GetCurrentUserProfile @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  users(where: { uid: { eq_expr: "auth.uid" } }) {
    id
    username
    email
    createdAt
    avatarUrl
    bio
  }
}

mutation CreateNewPost($title: String!, $content: String!) @auth(level: USER) {
  posts_insert(data: {
    title: $title,
    content: $content,
    authorUid_expr: "auth.uid",
    createdAt_expr: "request.time"
  })
}

mutation UpdateUserProfile($newBio: String!) @auth(level: USER) {
  users_update(
    key: { uid: { eq_expr: "auth.uid" } },
    data: { bio: $newBio, updatedAt_expr: "request.time" }
  )
}